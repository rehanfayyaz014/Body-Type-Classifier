<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1729" />
  <title>FitAI — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles-enhanced.css" />
  <link rel="stylesheet" href="/css/auth.css" />
  <link rel="stylesheet" href="/css/profile.css" />
</head>
<body class="theme-dark">
  <div class="bg-layer" aria-hidden="true"></div>
  <div class="bg-vignette" aria-hidden="true"></div>

  <div id="app">
    <header class="top-bar" id="top-bar">
      <div class="top-bar__left">
        <button type="button" class="icon-btn" id="btn-home" aria-label="Back">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span class="logo" id="brand-title">FitForge</span>
      </div>
      <div class="top-bar__center" id="header-user-welcome" aria-live="polite"></div>
      <div class="top-bar__right">
        <button type="button" class="icon-btn" id="btn-theme" aria-label="Toggle theme">
          <svg class="icon-sun" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg class="icon-moon hidden" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <main class="main profile-page">
      <div class="glass-card profile-header-card">
        <div class="profile-avatar" id="profile-avatar-letter">G</div>
        <div class="profile-header-info">
          <h1 class="profile-name" id="profile-name" data-i18n="profileGuestName">Guest</h1>
          <p class="profile-email" id="profile-email" data-i18n="profileGuestEmail">Not signed in</p>
        </div>
      </div>

      <div class="glass-card profile-current-card">
        <p class="profile-section-label" data-i18n="profileCurrentStatus">Current Status</p>
        <h2 class="profile-current-type" id="profile-current-type" data-i18n="profileNotAssessed">Not assessed yet</h2>
        <div class="profile-metric-grid">
          <div class="profile-metric">
            <span class="profile-metric__label" data-i18n="profileHeightLabel">Height</span>
            <strong id="profile-height">--</strong>
          </div>
          <div class="profile-metric">
            <span class="profile-metric__label" data-i18n="profileWeightLabel">Weight</span>
            <div class="profile-weight-edit">
              <strong id="profile-weight">--</strong>
              <button type="button" class="edit-btn-inline" id="btn-edit-weight" title="Edit Weight">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
              </button>
            </div>
          </div>
          <div class="profile-metric">
            <span class="profile-metric__label" data-i18n="profileBmiLabel">BMI</span>
            <strong id="profile-current-bmi">--</strong>
          </div>
        </div>

        <button type="button" class="profile-history-toggle" id="profile-history-toggle" aria-expanded="false">
          <span class="profile-history-toggle__title" data-i18n="profileHistoryToggleTitle">Food History</span>
          <span class="profile-history-toggle__hint" data-i18n="profileHistoryToggleHint">Tap to view your food logs</span>
        </button>
      </div>

      <div id="profile-history-panel" class="profile-history-panel hidden">
        <div class="profile-section">
          <div class="profile-section-heading">
            <h2 class="profile-section-title" data-i18n="profileFoodHistoryTitle">Food Tracking History</h2>
            <span class="profile-section-helper" data-i18n="profileFoodHistoryHint">Your recent meals and macros</span>
          </div>
          <div id="profile-food-history" class="profile-history-list"></div>
        </div>
      </div>
    </main>

    <!-- Weight Edit Modal -->
    <div id="weight-modal-overlay" class="auth-overlay hidden" aria-hidden="true">
      <div class="auth-modal glass-card">
        <button type="button" class="auth-modal__close" id="weight-modal-close" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <h2 class="profile-section-title" style="margin-bottom: 1.5rem; text-align: center; font-size: 1.2rem;">Update Your Weight</h2>
        <form id="weight-edit-form" class="auth-form">
          <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label for="new-weight-input" style="font-size: 0.85rem; color: var(--text-muted);">Weight (kg)</label>
            <input type="number" id="new-weight-input" step="0.1" placeholder="e.g. 70.5" required />
          </div>
          <button type="submit" class="btn btn--primary" style="margin-top: 1.5rem; width: 100%; padding: 0.8rem; border-radius: 12px; background: linear-gradient(135deg, #2dd4bf, #0ea5e9); color: #04131f; font-weight: 700; border: none; cursor: pointer;">Save Changes</button>
        </form>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal-overlay" class="auth-overlay hidden" aria-hidden="true">
      <div class="auth-modal glass-card" style="max-width: 320px; text-align: center;">
        <div style="width: 48px; height: 48px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </div>
        <h2 class="profile-section-title" style="margin-bottom: 0.5rem; font-size: 1.1rem;">Delete Food Log?</h2>
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem;">This action cannot be undone. Are you sure you want to remove this entry?</p>
        <div style="display: flex; gap: 0.75rem;">
          <button type="button" class="btn" id="btn-delete-cancel" style="flex: 1; padding: 0.7rem; border-radius: 10px; background: var(--glass); border: 1px solid var(--glass-border); color: var(--text); font-weight: 600; cursor: pointer;">Cancel</button>
          <button type="button" class="btn" id="btn-delete-confirm" style="flex: 1; padding: 0.7rem; border-radius: 10px; background: #ef4444; border: none; color: #fff; font-weight: 600; cursor: pointer;">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
